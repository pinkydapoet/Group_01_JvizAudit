<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J-VizAudit – Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>

  <style>
    :root {
      --bg-base: #0b0f19; --bg-panel: #111827; --bg-panel-2: #1a2236; --bg-hover: #1e2d45;
      --border: #1e3a5f; --border-light: #2a4a72;
      --accent-cyan: #00d4ff; --accent-green: #39d98a; --accent-orange: #ff8c42; --accent-red: #ff4d6d; --accent-purple: #a855f7;
      --text-primary: #e8f4fd; --text-secondary: #7fa8cc; --text-dim: #3d5a7a;
      --font-ui: 'Sora', sans-serif; --font-code: 'JetBrains Mono', monospace;
      --radius-sm: 6px; --radius-md: 10px; --transition: all 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font-ui); background: var(--bg-base); color: var(--text-primary); display: flex; flex-direction: column; font-size: 14px; }
    
    /* Navbar */
    .navbar { display: flex; align-items: center; height: 52px; padding: 0 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); gap: 16px; flex-shrink: 0; z-index: 100; }
    .navbar-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-family: var(--font-code); font-weight: 600; color: var(--bg-base); }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent-cyan); }
    .navbar-divider { width: 1px; height: 24px; background: var(--border); }
    .nav-tab { padding: 5px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--text-secondary); text-decoration: none; text-transform: uppercase; }
    .nav-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .nav-tab.active { color: var(--accent-cyan); background: rgba(0,212,255,0.08); }
    .navbar-spacer { flex: 1; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-ui); text-decoration: none; }
    .btn-primary { background: var(--accent-green); color: var(--bg-base); }
    .btn-secondary { background: rgba(0,212,255,0.1); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
    
    /* Layout */
    .workspace { display: flex; flex: 1; overflow: hidden; }
    .pane-container { display: flex; flex: 1; overflow: hidden; }
    
    /* Cột Trái: Code Editor + Console */
    .editor-pane { display: flex; flex-direction: column; width: 50%; border-right: 1px solid var(--border); }
    .code-editor { flex: 1; position: relative; background: var(--bg-base); }
    .output-pane { height: 180px; border-top: 1px solid var(--border); background: var(--bg-panel); display: flex; flex-direction: column; }
    .output-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; background: var(--bg-panel-2); border-bottom: 1px solid var(--border); }
    .output-content { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--font-code); font-size: 12px; color: var(--text-secondary); }
    .out-success { color: var(--accent-green); } .out-err { color: var(--accent-red); } .out-info { color: var(--accent-cyan); } .out-warn { color: #ffa500; }
    
    /* Cột Phải: UML & Flowchart */
    .right-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .viz-tabs { display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
    .viz-tab { padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; text-decoration: none; text-transform: uppercase; border-bottom: 2px solid transparent; }
    .viz-tab:hover { color: var(--text-primary); }
    .viz-tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }
    .viz-area { flex: 1; overflow: hidden; position: relative; background: var(--bg-base); }
    .viz-container { display: none; width: 100%; height: 100%; padding: 20px; overflow: auto; }
    .viz-container.active { display: block; }
    
    .highlighted-line { background-color: rgba(255, 200, 0, 0.2) !important; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a th:href="@{/}" class="navbar-logo">
    <div class="logo-icon">JV</div>
    <div class="logo-text">J-<span>VizAudit</span></div>
  </a>
  <div class="navbar-divider"></div>
  <a th:href="@{/editor}" class="nav-tab active">Editor</a>
  <a th:href="@{/history}" class="nav-tab">History</a>
  
  <div class="navbar-spacer"></div>
  
  <a th:href="@{/profile}" class="btn btn-ghost" style="border:none; margin-right: 10px;">👤 Profile</a>
  
  <form th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button type="submit" class="btn btn-ghost" style="border:none;">🚪 Sign Out</button>
  </form>
</nav>

<div class="workspace">
  <div class="pane-container">
    
    <div class="editor-pane">
      <div class="code-editor" id="editor-container"></div>
      
      <div class="output-pane">
        <div class="output-header">
            <div style="font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;">Console / Terminal</div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-ghost" id="saveBtn" style="padding: 5px 12px; font-size: 11px;"><span>💾</span> Save</button>
                <button class="btn btn-secondary" id="formatBtn" style="padding: 5px 12px; font-size: 11px;"><span>⚙</span> Format</button>
                <button class="btn btn-primary" id="runBtn" style="padding: 5px 12px; font-size: 11px;"><span>▶</span> Run</button>
            </div>
        </div>
        <div style="display: flex; flex: 1; overflow: hidden;">
            <div style="flex: 1; border-right: 1px solid var(--border); display: flex; flex-direction: column;">
                <div style="font-size: 10px; color: var(--text-dim); padding: 4px 14px; background: var(--bg-panel-2);">INPUT (STDIN)</div>
                <textarea id="stdInput" style="flex: 1; background: var(--bg-base); color: var(--text-primary); border: none; padding: 10px 14px; font-family: var(--font-code); font-size: 12px; resize: none; outline: none;" placeholder="Enter inputs here (e.g., numbers for Scanner) before running..."></textarea>
            </div>
            <div style="flex: 2; display: flex; flex-direction: column;">
                <div style="font-size: 10px; color: var(--text-dim); padding: 4px 14px; background: var(--bg-panel-2);">OUTPUT (STDOUT)</div>
                <div class="output-content" style="flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--font-code); font-size: 12px; color: var(--text-secondary);"></div>
            </div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="viz-tabs">
        <a class="viz-tab active" data-tab="uml">UML Diagram</a>
        <a class="viz-tab" data-tab="flowchart">Flowchart</a>
        <div class="navbar-spacer"></div>
        <div style="font-size: 11px; color: var(--text-secondary); margin-right: 15px; display: flex; align-items: center; gap: 5px;">
            <span class="status-dot" id="ws-status"></span> WebSocket
        </div>
      </div>

      <div class="viz-area">
        <div id="uml-container" class="viz-container active">
            <p style="color: var(--text-dim); text-align: center; margin-top: 40px;">Start typing Java code to generate UML diagram...</p>
        </div>
        <div id="flowchart-container" class="viz-container">
            <p style="color: var(--text-dim); text-align: center; margin-top: 40px;">Start typing Java code to generate flowchart...</p>
        </div>
      </div>
    </div>
    
  </div>
</div>

<script th:inline="javascript">
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    async function renderDiagram(containerId, syntax) {
        const container = document.getElementById(containerId);
        if (!container) return;
        try {
            const { svg } = await mermaid.render('svg-' + Date.now(), syntax);
            container.innerHTML = svg;
        } catch (e) {
            container.innerHTML = '<p style="color: var(--text-dim); text-align: center; margin-top: 40px;">Generating diagram...</p>';
        }
    }

    document.querySelectorAll('.viz-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.viz-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.viz-container').forEach(c => c.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab + '-container').classList.add('active');
        });
    });

    let globalEditor = null;
    let stompClient = null;

    function publishCodeForDiagrams() {
        if (!globalEditor || !stompClient || !stompClient.connected) {
            setTimeout(() => { if (globalEditor && stompClient && stompClient.connected) publishCodeForDiagrams(); }, 500);
            return;
        }
        const code = globalEditor.getValue();
        if (code && code.trim().length > 0) {
            stompClient.publish({ destination: '/app/code.update', body: code });
        }
    }

    stompClient = new StompJs.Client({
        webSocketFactory: () => new SockJS('/ws-jvizaudit'),
        reconnectDelay: 5000,
        onConnect: () => {
            document.getElementById('ws-status').style.background = 'var(--accent-green)';
            stompClient.subscribe('/user/queue/uml', (msg) => { if(msg.body) renderDiagram('uml-container', msg.body); });
            stompClient.subscribe('/user/queue/flowchart', (msg) => { if(msg.body) renderDiagram('flowchart-container', msg.body); });
            setTimeout(publishCodeForDiagrams, 200);
        },
        onStompError: () => document.getElementById('ws-status').style.background = 'var(--accent-red)',
        onWebSocketError: () => document.getElementById('ws-status').style.background = 'var(--accent-red)'
    });
    stompClient.activate();

    function appendOutput(text, className = '') {
        const out = document.querySelector('.output-content');
        out.innerHTML += `<div class="${className}"><pre style="margin:0; font-family:inherit;">${text}</pre></div>`;
        out.scrollTop = out.scrollHeight;
    }

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        let savedCode = /*[[${code}]]*/ null;
        if (!savedCode) savedCode = "public class Main {\n  public static void main(String[] args) {\n    System.out.println(\"Hello J-VizAudit!\");\n  }\n}";

        globalEditor = monaco.editor.create(document.getElementById('editor-container'), {
            value: savedCode, language: 'java', theme: 'vs-dark', minimap: { enabled: false }, fontSize: 13
        });

        let typingTimer;
        globalEditor.onDidChangeModelContent(() => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(publishCodeForDiagrams, 500);
        });

        document.getElementById('formatBtn').addEventListener('click', async () => {
            appendOutput('▶ Formatting...', 'out-info');
            const res = await fetch('/api/format', { method: 'POST', body: globalEditor.getValue() });
            if(res.ok) { globalEditor.setValue(await res.text()); appendOutput('✓ Formatting complete!', 'out-success'); }
            else appendOutput('✗ Formatting failed', 'out-err');
        });

        document.getElementById('runBtn').addEventListener('click', async () => {
            document.querySelector('.output-content').innerHTML = '';
            appendOutput('▶ Running...', 'out-info');
            
            const codeVal = globalEditor.getValue();
            const inputVal = document.getElementById('stdInput').value;
            
            const res = await fetch('/api/execute', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: codeVal, input: inputVal }) 
            });
            
            if(res.ok) appendOutput(await res.text(), 'out-success');
            else appendOutput('✗ Server Error', 'out-err');
        });
        
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const historyName = prompt('📝 Enter a name for this workspace:', 'My Code - ' + new Date().toLocaleString());
            if (!historyName || !historyName.trim()) return;
            const res = await fetch('/api/history', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sourceCode: globalEditor.getValue(), historyName: historyName.trim() })
            });
            if(res.ok && (await res.text()).includes('Saved')) appendOutput('✅ Workspace saved!', 'out-success');
            else appendOutput('✗ Failed to save', 'out-err');
        });
    });
</script>
</body>
</html>
