<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J-VizAudit – Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        :root { --bg-base: #0b0f19; --bg-panel: #111827; --bg-panel-2: #1a2236; --border: #1e3a5f; --accent-cyan: #00d4ff; --accent-green: #39d98a; --accent-red: #ff4d6d; --text-primary: #e8f4fd; --text-secondary: #7fa8cc; --font-ui: 'Sora', sans-serif; }
        body { font-family: var(--font-ui); background: var(--bg-base); color: var(--text-primary); margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 100%; max-width: 600px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h2 { color: var(--accent-cyan); margin-top: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .info-label { color: var(--text-secondary); font-size: 13px; font-weight: 600; }
        .info-value { color: var(--text-primary); font-size: 14px; font-weight: 700; }
        
        .input-group { margin-bottom: 16px; margin-top: 10px;}
        .input-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 12px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; box-sizing: border-box; font-family: var(--font-ui); }
        
        .btn { padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: var(--font-ui); transition: 0.2s; display: inline-block; text-decoration: none;}
        .btn-primary { background: var(--accent-cyan); color: #0b0f19; width: 100%; margin-top: 10px;}
        .btn-danger { background: rgba(255, 77, 109, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); width: 100%; }
        .btn-danger:hover { background: var(--accent-red); color: white; }
        
        .alert { padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; text-align: center; }
        .alert-success { background: rgba(57, 217, 138, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .alert-error { background: rgba(255, 77, 109, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }
        
        .danger-zone { margin-top: 40px; padding: 20px; border: 1px dashed var(--accent-red); border-radius: 8px; background: rgba(255,0,0,0.02); }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 600px; margin-bottom: 20px;">
        <a th:href="@{/editor}" style="color: var(--text-secondary); text-decoration: none; font-weight: 600;">← Back to Editor</a>
    </div>

    <div style="width: 100%; max-width: 600px;">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    </div>

    <div class="dashboard">
        <h2>👤 Account Information</h2>
        <div class="info-row">
            <span class="info-label">Username</span>
            <span class="info-value" th:text="${user.username}">user123</span>
        </div>
        <div class="info-row">
            <span class="info-label">Email</span>
            <span class="info-value" th:text="${user.email}">user@email.com</span>
        </div>
        <div class="info-row">
            <span class="info-label">Role</span>
            <span class="info-value" style="text-transform: capitalize; color: var(--accent-cyan);" th:text="${user.role}">Student</span>
        </div>
    </div>

    <div class="dashboard">
        <h2>🔒 Change Password</h2>
        <form th:action="@{/profile/password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="input-group">
                <label>Current Password</label>
                <input type="password" name="oldPassword" placeholder="••••••••" title="Enter your current password" required />
            </div>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" name="newPassword" placeholder="••••••••" title="Enter your new password (min 6 characters)" required minlength="6" />
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
    </div>

    <div class="dashboard danger-zone">
        <h2 style="color: var(--accent-red); border-color: rgba(255, 77, 109, 0.3);">⚠️ Danger Zone</h2>
        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 20px;">
            Once you delete your account, there is no going back. All your saved workspaces, codes, and data will be permanently erased. Please be certain.
        </p>
        <form th:action="@{/profile/delete}" method="post" onsubmit="return confirm('Are you absolutely sure you want to delete your account? This action cannot be undone.');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-danger">Delete My Account</button>
        </form>
    </div>
</body>
</html>
