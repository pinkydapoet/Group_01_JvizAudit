<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J-VizAudit – Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>

  <style>
    :root {
      --bg-base: #0b0f19; --bg-panel: #111827; --bg-panel-2: #1a2236; --bg-hover: #1e2d45;
      --border: #1e3a5f; --border-light: #2a4a72;
      --accent-cyan: #00d4ff; --accent-green: #39d98a; --accent-orange: #ff8c42; --accent-red: #ff4d6d; --accent-purple: #a855f7;
      --text-primary: #e8f4fd; --text-secondary: #7fa8cc; --text-dim: #3d5a7a;
      --font-ui: 'Sora', sans-serif; --font-code: 'JetBrains Mono', monospace;
      --radius-sm: 6px; --radius-md: 10px; --transition: all 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--font-ui); background: var(--bg-base); color: var(--text-primary); display: flex; flex-direction: column; font-size: 14px; }
    
    /* Navbar & Toolbar */
    .navbar { display: flex; align-items: center; height: 52px; padding: 0 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); gap: 16px; flex-shrink: 0; z-index: 100; }
    .navbar-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; font-family: var(--font-code); font-weight: 600; color: var(--bg-base); }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent-cyan); }
    .navbar-divider { width: 1px; height: 24px; background: var(--border); }
    .nav-tab { padding: 5px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; color: var(--text-secondary); text-decoration: none; text-transform: uppercase; }
    .nav-tab:hover { color: var(--text-primary); background: var(--bg-hover); }
    .nav-tab.active { color: var(--accent-cyan); background: rgba(0,212,255,0.08); }
    .navbar-spacer { flex: 1; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: var(--font-ui); }
    .btn-primary { background: var(--accent-green); color: var(--bg-base); }
    .btn-secondary { background: rgba(0,212,255,0.1); color: var(--accent-cyan); border: 1px solid rgba(0,212,255,0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    
    /* Layout */
    .workspace { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 240px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-header { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 8px 0; }
    .sidebar-item { padding: 8px 12px; color: var(--text-secondary); font-size: 13px; cursor: pointer; }
    .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar-section { padding: 12px; border-top: 1px solid var(--border); }
    .user-detail { display: flex; flex-direction: column; gap: 8px; padding: 12px; background: var(--bg-panel-2); border-radius: var(--radius-sm); }
    .user-detail-item { font-size: 12px; color: var(--text-secondary); }
    .pane-container { display: flex; flex: 1; overflow: hidden; }
    .editor-pane { display: flex; flex-direction: column; width: 50%; border-right: 1px solid var(--border); }
    .code-editor { flex: 1; position: relative; background: var(--bg-base); }
    .output-pane { height: 130px; border-top: 1px solid var(--border); background: var(--bg-panel); display: flex; flex-direction: column; }
    .output-content { flex: 1; overflow-y: auto; padding: 10px 14px; font-family: var(--font-code); font-size: 12px; color: var(--text-secondary); }
    .out-success { color: var(--accent-green); } .out-err { color: var(--accent-red); } .out-info { color: var(--accent-cyan); } .out-warn { color: #ffa500; }
    .right-panel { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .viz-tabs { display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-panel); }
    .viz-tab { padding: 10px 18px; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; text-decoration: none; text-transform: uppercase; border-bottom: 2px solid transparent; }
    .viz-tab:hover { color: var(--text-primary); }
    .viz-tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }
    .viz-area { flex: 1; overflow: hidden; position: relative; background: var(--bg-base); }
    .viz-container { display: none; width: 100%; height: 100%; padding: 20px; overflow: auto; }
    .viz-container.active { display: block; }
    
    /* Line highlighting styles for Monaco Editor */
    .highlighted-line { background-color: rgba(255, 200, 0, 0.2) !important; }
    
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a th:href="@{/}" class="navbar-logo">
    <div class="logo-icon">JV</div>
    <div class="logo-text">J-<span>VizAudit</span></div>
  </a>
  <div class="navbar-divider"></div>
  <a th:href="@{/editor}" class="nav-tab active">Editor</a>
  <a th:href="@{/history}" class="nav-tab">History</a>
  
  <div class="navbar-spacer"></div>
  
  <button class="btn btn-ghost" id="userBtn" style="border:none; margin-right: 10px;">👤 Profile</button>
  
  <form th:action="@{/logout}" method="post" style="display:inline;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <button type="submit" class="btn btn-ghost" style="border:none; margin-right: 10px;">🚪 Sign Out</button>
  </form>
  
  <button class="btn btn-ghost" id="saveBtn"><span>💾</span> <span>Save</span></button>
  <button class="btn btn-secondary" id="formatBtn"><span>⚙</span> <span>Format</span></button>
  <button class="btn btn-primary" id="runBtn"><span>▶</span> <span>Run</span></button>
</nav>

<div class="workspace">
  <!-- Left Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">Workspace</div>
    <div class="sidebar-content">
      <div class="sidebar-item">📁 Recent Files</div>
      <div class="sidebar-item">🔍 Search</div>
      <div class="sidebar-item">⭐ Favorites</div>
    </div>
    
    <div class="sidebar-section">
      <div class="user-detail">
        <div class="user-detail-item"><strong>User Details</strong></div>
        <div class="user-detail-item" id="userEmail">Email: Loading...</div>
        <div class="user-detail-item" id="userRole">Role: Loading...</div>
        <button class="btn btn-ghost" id="viewProfileBtn" style="width: 100%; margin-top: 8px; font-size: 11px; padding: 6px;">View Profile</button>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="pane-container">
    <div class="editor-pane">
      <div class="code-editor" id="editor-container"></div>
      
      <div class="output-pane">
        <div style="padding: 5px 14px; background: var(--bg-panel-2); font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border); color: var(--text-secondary);">Output / Console</div>
        <div class="output-content"></div>
      </div>
    </div>

    <div class="right-panel">
      <div class="viz-tabs">
        <a class="viz-tab active" data-tab="uml">UML Diagram</a>
        <a class="viz-tab" data-tab="flowchart">Flowchart</a>
        <div class="navbar-spacer"></div>
        <div style="font-size: 11px; color: var(--text-secondary); margin-right: 15px; display: flex; align-items: center; gap: 5px;">
            <span class="status-dot" id="ws-status"></span> WebSocket
        </div>
      </div>

      <div class="viz-area">
        <div id="uml-container" class="viz-container active" style="width: 100%; height: 100%; padding: 20px; overflow: auto;">
            <p style="color: var(--text-dim); text-align: center; margin-top: 40px;">
                Start typing Java code to generate UML diagram...
            </p>
        </div>
        <div id="flowchart-container" class="viz-container" style="width: 100%; height: 100%; padding: 20px; overflow: auto;">
            <p style="color: var(--text-dim); text-align: center; margin-top: 40px;">
                Start typing Java code to generate flowchart...
            </p>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
    // Initialize Mermaid with click handlers
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    // Store metadata from diagrams for click handlers
    let diagramMetadata = {};

    async function renderDiagram(containerId, syntax) {
        const container = document.getElementById(containerId);
        if (!container) return;
        try {
            const { svg } = await mermaid.render('svg-' + Date.now(), syntax);
            container.innerHTML = svg;
            
            setTimeout(() => {
                const svgElements = container.querySelectorAll('[data-id]');
                svgElements.forEach(el => {
                    el.style.cursor = 'pointer';
                    el.addEventListener('click', (e) => {
                        handleDiagramNodeClick(el, containerId);
                    });
                    el.addEventListener('mouseover', () => {
                        el.style.opacity = '0.8';
                    });
                    el.addEventListener('mouseout', () => {
                        el.style.opacity = '1';
                    });
                });
            }, 100);
        } catch (e) {
            container.innerHTML = '<p style="color: var(--text-dim); text-align: center; margin-top: 40px;">Generating diagram...</p>';
        }
    }

    function handleDiagramNodeClick(element, containerId) {
        const nodeId = element.getAttribute('data-id');
        console.log('Clicked node:', nodeId);
        
        if (!globalEditor || !nodeId) return;
        
        const code = globalEditor.getValue();
        const lines = code.split('\n');
        let lineNumber = null;
        
        // Try to find method ID (M followed by digits)
        if (nodeId.match(/^M(\d+)$/)) {
            lineNumber = parseInt(nodeId.match(/M(\d+)/)[1]);
        } else {
            // Try to find class name or method name in code
            const cleanId = nodeId.replace(/[^a-zA-Z0-9_]/g, '');
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                // Match "class ClassName" or "public void methodName()"
                if (line.includes('class ' + cleanId) || 
                    line.includes('void ' + cleanId) ||
                    line.includes('public ' + cleanId)) {
                    lineNumber = i + 1;
                    break;
                }
            }
        }
        
        if (lineNumber) {
            highlightCodeLine(lineNumber);
            globalEditor.revealLineInCenter(lineNumber);
            globalEditor.setSelection(new monaco.Range(lineNumber, 1, lineNumber, 1));
            console.log('✅ Highlighted line:', lineNumber);
        } else {
            console.warn('⚠️ Could not find line for node:', nodeId);
        }
    }

    function highlightCodeLine(lineNumber) {
        if (!globalEditor) return;
        globalEditor.deltaDecorations(globalEditor.getModel().getAllDecorations().map(d => d.id), []);
        const newDecoration = [{
            range: new monaco.Range(lineNumber, 1, lineNumber, 1),
            options: {
                isWholeLine: true,
                className: 'highlighted-line',
                backgroundColor: 'rgba(255, 200, 0, 0.2)',
                borderLeft: '4px solid #FFD700'
            }
        }];
        globalEditor.deltaDecorations([], newDecoration);
    }

    // Diagram Tab Switching
    document.querySelectorAll('.viz-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.viz-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.viz-container').forEach(c => c.classList.remove('active'));
            
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            const container = document.getElementById(tabName + '-container');
            if (container) {
                container.classList.add('active');
            }
        });
    });

    // Global editor reference and publish function
    let globalEditor = null;
    let stompClient = null;

    // Function to publish code for diagram generation
    function publishCodeForDiagrams() {
        if (!globalEditor || !stompClient || !stompClient.connected) {
            console.warn('⚠️ Editor or WebSocket not ready - will retry in 500ms');
            // Retry after waiting for WebSocket to connect
            setTimeout(() => {
                if (globalEditor && stompClient && stompClient.connected) {
                    publishCodeForDiagrams();
                }
            }, 500);
            return;
        }
        const code = globalEditor.getValue();
        if (code && code.trim().length > 0) {
            console.log('📤 Publishing code (' + code.length + ' chars) for diagram generation');
            stompClient.publish({
                destination: '/app/code.update',
                body: code
            });
        } else {
            console.warn('⚠️ No code to publish');
        }
    }

    // Connect WebSockets with better error handling
    let flowchartData = null;
    stompClient = new StompJs.Client({
        webSocketFactory: () => new SockJS('/ws-jvizaudit'),
        reconnectDelay: 5000,
        heartbeatIncoming: 4000,
        heartbeatOutgoing: 4000,
        onConnect: () => {
            console.log('✓ WebSocket Connected!');
            console.log('📋 Subscribing to /user/queue/uml and /user/queue/flowchart');
            document.getElementById('ws-status').style.background = 'var(--accent-green)';
            
            const umlSub = stompClient.subscribe('/user/queue/uml', (msg) => {
                console.log('✅ MESSAGE RECEIVED on /user/queue/uml');
                console.log('📊 UML Diagram received, length:', msg.body.length);
                console.log('📊 Content preview:', msg.body.substring(0, 100) + '...');
                if (!msg.body || msg.body.trim().length === 0) {
                    console.error('❌ Received empty UML message!');
                    return;
                }
                renderDiagram('uml-container', msg.body);
            });
            
            const fcSub = stompClient.subscribe('/user/queue/flowchart', (msg) => {
                console.log('✅ MESSAGE RECEIVED on /user/queue/flowchart');
                console.log('📈 Flowchart received, length:', msg.body.length);
                console.log('📈 Content preview:', msg.body.substring(0, 100) + '...');
                if (!msg.body || msg.body.trim().length === 0) {
                    console.error('❌ Received empty Flowchart message!');
                    return;
                }
                flowchartData = msg.body;
                renderDiagram('flowchart-container', msg.body);
            });
            
            console.log('✓ Subscriptions established:', umlSub, fcSub);
            
            // Publish initial code after WebSocket connects
            setTimeout(() => {
                console.log('📤 Publishing initial code after WebSocket connection');
                publishCodeForDiagrams();
            }, 200);
        },
        onStompError: (frame) => {
             console.error('✗ WebSocket STOMP Error:', frame);
             document.getElementById('ws-status').style.background = 'var(--accent-red)';
        },
        onWebSocketError: (error) => {
             console.error('✗ WebSocket Connection Error:', error);
             document.getElementById('ws-status').style.background = 'var(--accent-red)';
        }
    });
    stompClient.activate();

    // Console Helper
    function appendOutput(text, className = '') {
        const out = document.querySelector('.output-content');
        out.innerHTML += `<div class="${className}"><pre style="margin:0; font-family:inherit;">${text}</pre></div>`;
        out.scrollTop = out.scrollHeight;
    }

    // Load User Details
    async function loadUserDetails() {
        try {
            const response = await fetch('/api/user', { method: 'GET' });
            if (response.ok) {
                const user = await response.json();
                document.getElementById('userEmail').textContent = 'Email: ' + user.email;
                document.getElementById('userRole').textContent = 'Role: ' + user.role;
            }
        } catch (e) {
            console.log('Could not load user details:', e);
        }
    }
    loadUserDetails();

    // Setup Monaco Editor
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        
        let savedCode = /*[[${code}]]*/ null;
        if (!savedCode) {
            savedCode = "public class Main {\n  public static void main(String[] args) {\n    System.out.println(\"Hello J-VizAudit!\");\n  }\n}";
        }

        globalEditor = monaco.editor.create(document.getElementById('editor-container'), {
            value: savedCode,
            language: 'java',
            theme: 'vs-dark',
            minimap: { enabled: false },
            fontSize: 13
        });

        // Automatic diagram generation on code change (Debounced)
        let typingTimer;
        globalEditor.onDidChangeModelContent(() => {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                publishCodeForDiagrams();
            }, 500);
        });
        
        // Publish initial code - wait for WebSocket to be ready
        console.log('📋 Editor created, waiting for WebSocket connection...');
        
        let waitAttempts = 0;
        let waitInterval = setInterval(() => {
            waitAttempts++;
            
            if (stompClient && stompClient.connected) {
                console.log('📤 WebSocket ready! Publishing initial code for diagrams');
                clearInterval(waitInterval);
                publishCodeForDiagrams();
            } else if (waitAttempts > 16) {
                // 16 * 300ms = ~5 seconds timeout
                console.error('❌ WebSocket connection timeout - attempting to publish anyway');
                clearInterval(waitInterval);
                publishCodeForDiagrams();
            }
        }, 300);

        // Format
        document.getElementById('formatBtn').addEventListener('click', async () => {
            appendOutput('▶ Formatting...', 'out-info');
            const res = await fetch('/api/format', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: globalEditor.getValue()
            });
            if(res.ok) {
                const formatted = await res.text();
                globalEditor.setValue(formatted);
                appendOutput('✓ Formatting complete!', 'out-success');
            } else {
                appendOutput('✗ Formatting failed', 'out-err');
            }
        });

        // Run
        document.getElementById('runBtn').addEventListener('click', async () => {
            document.querySelector('.output-content').innerHTML = '';
            appendOutput('▶ Running in secure container...', 'out-info');
            
            const res = await fetch('/api/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: globalEditor.getValue()
            });
            if(res.ok) {
                const output = await res.text();
                appendOutput(output, 'out-success');
            } else {
                appendOutput('✗ Server Error', 'out-err');
            }
        });
        
        // Save
        document.getElementById('saveBtn').addEventListener('click', async () => {
            // Prompt user for history name
            const historyName = prompt('📝 Enter a name for this workspace:', 'My Code - ' + new Date().toLocaleString());
            if (!historyName || historyName.trim() === '') {
                appendOutput('⚠️ Save cancelled - no name provided', 'out-warn');
                return;
            }
            
            const code = globalEditor.getValue();
            if (!code || code.trim().length === 0) {
                appendOutput('✗ Cannot save empty workspace', 'out-err');
                return;
            }
            
            try {
                console.log('💾 Saving history:', { historyName, length: code.length });
                const res = await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sourceCode: code, historyName: historyName.trim() })
                });
                
                const text = await res.text();
                console.log('📤 Save response:', text);
                
                if(res.ok && text.includes('Saved')) {
                    appendOutput('✅ Workspace "' + historyName + '" saved successfully!', 'out-success');
                } else {
                    appendOutput('✗ Failed to save: ' + text, 'out-err');
                }
            } catch(err) {
                console.error('❌ Save error:', err);
                appendOutput('✗ Save error: ' + err.message, 'out-err');
            }
        });

        // Profile Button
        document.getElementById('userBtn').addEventListener('click', () => {
            alert('User profile page will be implemented soon!');
        });
    });
</script>
</body>
</html>
